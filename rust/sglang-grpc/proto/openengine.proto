//
// OpenEngine API v1 -- vendor-neutral runtime API between inference
// orchestration systems (e.g. Dynamo) and model engines (e.g. vLLM, SGLang,
// TensorRT-LLM).
//
// This file is the CANONICAL contract and single source of truth for the wire
// shape. Implementations should generate client and server bindings from this
// proto or from an exact copy pinned to a known OpenEngine revision.
//
// Human-readable reference:
// https://github.com/ai-dynamo/openengine/blob/main/docs/api.md

syntax = "proto3";

package openengine.v1;

import "google/protobuf/struct.proto";

service OpenEngine {
  // Core inference path.
  rpc Generate(GenerateRequest) returns (stream GenerateResponse);

  // Runtime metadata and scheduling state.
  rpc GetEngineInfo(GetEngineInfoRequest) returns (EngineInfo);
  rpc GetModelInfo(GetModelInfoRequest) returns (ModelInfo);
  rpc GetLoad(GetLoadRequest) returns (LoadInfo);

  // Health and lifecycle.
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc Abort(AbortRequest) returns (AbortResponse);
  rpc Drain(DrainRequest) returns (stream DrainResponse);

  // Disaggregated serving / KV transfer.
  rpc GetKvConnectorInfo(GetKvConnectorInfoRequest) returns (KvConnectorInfo);
  rpc GetKvEventSources(GetKvEventSourcesRequest) returns (GetKvEventSourcesResponse);
  rpc SubscribeKvEvents(SubscribeKvEventsRequest) returns (stream KvEventBatch);

  // Structured runtime events for planners/controllers.
  rpc SubscribeRuntimeEvents(SubscribeRuntimeEventsRequest) returns (stream RuntimeEvent);
}

// Optional LoRA control plane. Engines advertise support through
// ModelInfo.supports_lora and serve this service on the OpenEngine endpoint.
service LoraManager {
  rpc LoadLora(LoadLoraRequest) returns (LoadLoraResponse);
  rpc UnloadLora(UnloadLoraRequest) returns (UnloadLoraResponse);
  rpc ListLoras(ListLorasRequest) returns (ListLorasResponse);
}

// ---------------------------------------------------------------------------
// Core identity and roles
// ---------------------------------------------------------------------------

enum EngineRole {
  ENGINE_ROLE_UNSPECIFIED = 0;
  ENGINE_ROLE_AGGREGATED = 1;
  ENGINE_ROLE_PREFILL = 2;
  ENGINE_ROLE_DECODE = 3;
}

message GetEngineInfoRequest {}

message EngineInfo {
  string engine_name = 1;          // sglang, vllm, tensorrt_llm, etc.
  string engine_version = 2;
  string api_version = 3;          // openengine.v1
  EngineRole role = 4;
  string instance_id = 5;
  repeated string supported_models = 6;
  ParallelismInfo parallelism = 7;
  KvConnectorInfo kv_connector = 8;
}

message ParallelismInfo {
  uint32 tensor_parallel_size = 1;
  uint32 pipeline_parallel_size = 2;
  uint32 data_parallel_size = 3;
  uint32 data_parallel_rank = 4;
  uint32 data_parallel_start_rank = 5;
}

// ---------------------------------------------------------------------------
// Model and capacity metadata
// ---------------------------------------------------------------------------

message GetModelInfoRequest {}

message ModelInfo {
  string model_id = 1;
  string served_model_name = 2;
  repeated string served_model_aliases = 3;
  uint32 max_context_length = 4;
  uint32 max_output_tokens = 5;
  uint32 kv_block_size = 6;
  uint64 total_kv_blocks = 7;
  uint64 max_running_requests = 8;
  uint64 max_batched_tokens = 9;
  repeated string tokenizer_modes = 10;

  bool supports_text_input = 20;
  bool supports_token_ids_input = 21;
  bool supports_logprobs = 22;
  bool supports_guided_decoding = 23;
  bool supports_lora = 24;
  bool supports_multimodal = 25;

  // Engine-advertised response parser names. The orchestrator's frontend applies
  // these to a sidecar-served model's output stream (tool-call extraction,
  // reasoning/thinking separation) — the engine streams tokens, the frontend
  // parses. Empty = no parser configured for this model. Discovered from the
  // engine so the sidecar stays endpoint-only (no parser flags on the worker).
  string reasoning_parser = 26;
  string tool_call_parser = 27;
}

// ---------------------------------------------------------------------------
// LoRA lifecycle
// ---------------------------------------------------------------------------

message LoraAdapter {
  int64 lora_id = 1;
  string lora_name = 2;
  string source_path = 3;
}

message LoadLoraRequest {
  LoraAdapter adapter = 1;
}

message LoadLoraResponse {
  LoraAdapter adapter = 1;
  bool already_loaded = 2;
}

message UnloadLoraRequest {
  string lora_name = 1;
}

message UnloadLoraResponse {
  LoraAdapter adapter = 1;
}

message ListLorasRequest {}

message ListLorasResponse {
  repeated LoraAdapter adapters = 1;
}

// ---------------------------------------------------------------------------
// Generation API
// ---------------------------------------------------------------------------

message GenerateRequest {
  string request_id = 1;
  string model = 2;

  oneof input {
    string prompt = 3;
    TokenIds token_ids = 4;
  }

  SamplingParams sampling = 5;
  repeated StopCondition stop = 6;
  bool stream = 7;

  // Multimodal inputs. Order is significant: the i-th item aligns with the
  // i-th (un-expanded) placeholder marker carried in the prompt/token_ids.
  // The engine fetches/decodes and preprocesses each item, then expands the
  // marker into the model's replacement run. Empty for text-only requests.
  repeated MediaItem media = 8;

  // Constrained / guided decoding. Enforced engine-side by the grammar backend
  // during sampling — the orchestrator cannot apply it post-hoc. ModelInfo
  // .supports_guided_decoding advertises whether the engine honors it.
  GuidedDecoding guided = 9;

  // Loaded LoRA adapter name to apply to this request. Empty = base model.
  // ModelInfo.supports_lora advertises whether the engine serves LoraManager.
  string lora_name = 10;

  // Logprobs request controls (TokenOutput.logprobs carries the result).
  // return_logprobs turns emission on; top_logprobs is the per-token
  // alternatives count; logprob_start_len is the prompt offset to begin scoring
  // from (< 0 = engine default, i.e. completion tokens only).
  bool return_logprobs = 11;
  uint32 top_logprobs = 12;
  int32 logprob_start_len = 13;

  // Required for decode requests in disaggregated serving.
  KvSessionRef kv_session = 20;

  // Router-forced internal data-parallel rank. When set, the engine must place
  // this request on exactly this DP rank instead of load-balancing across
  // ranks. This is what keeps prefix->rank affinity for KV-aware routing: the
  // KV router decides a rank from the prefix it indexed, and the engine honors
  // it so a child block's parent stays in the same rank's radix subtree.
  // Unset = let the engine pick (no affinity). Rank 0 is valid, hence optional.
  optional uint32 data_parallel_rank = 21;

  // Optional request metadata for tracing/admission/routing.
  map<string, string> metadata = 30;
}

// Multimodal modality discriminator. 0 is treated as image for forward
// compatibility with senders that omit the field.
enum Modality {
  MODALITY_UNSPECIFIED = 0;
  MODALITY_IMAGE = 1;
  MODALITY_VIDEO = 2;
  MODALITY_AUDIO = 3;
}

// A single multimodal input. Exactly one `source` should be set. The engine
// owns fetch/decode/preprocess -- the orchestrator never derefs media (it has
// no GPU/NIXL agent in the sidecar deployment), so a pre-decoded/RDMA media
// descriptor is NOT representable here by design.
message MediaItem {
  Modality modality = 1;
  oneof source {
    string url       = 2;   // http(s):// -- engine fetches
    string data_uri  = 3;   // data:<mime>;base64,<...> -- engine decodes
    bytes  raw_bytes = 4;   // pre-fetched bytes -- engine still preprocesses
  }
  string mime_type = 5;     // optional, hints raw_bytes decode
  string uuid      = 6;     // optional caller id / mm_hash
}

message TokenIds {
  repeated uint32 ids = 1;
}

message SamplingParams {
  double temperature = 1;
  double top_p = 2;
  int32 top_k = 3;
  double frequency_penalty = 4;
  double presence_penalty = 5;
  uint32 max_tokens = 6;
  uint64 seed = 7;
  // When true the engine ignores the EOS token and generates until another
  // stop condition (e.g. max_tokens) fires. Without it the engine stops at
  // natural EOS, which truncates fixed-length benchmark workloads.
  bool ignore_eos = 8;
}

message StopCondition {
  oneof condition {
    string stop_text = 1;
    uint32 stop_token_id = 2;
  }
}

// Constrained / guided decoding spec. At most one of `guide` should be set.
// The engine enforces the constraint during sampling via its grammar backend
// (xgrammar / outlines / llguidance); the orchestrator cannot apply it post-hoc.
message GuidedDecoding {
  oneof guide {
    string json_schema = 1;     // output conforms to this JSON schema
    string regex = 2;           // output matches this regex
    string ebnf_grammar = 3;    // output follows this EBNF / context-free grammar
    string structural_tag = 4;  // xgrammar structural-tag constraint (JSON string)
  }
  // Optional grammar backend override (e.g. "xgrammar", "outlines",
  // "llguidance"). Empty = engine default.
  string backend = 5;
}

message GenerateResponse {
  string request_id = 1;

  oneof event {
    TokenOutput token = 2;
    PrefillReady prefill_ready = 3;
    GenerationFinished finished = 4;
    EngineError error = 5;
  }

  Usage usage = 10;
}

message TokenOutput {
  repeated uint32 token_ids = 1;
  string text = 2;
  // Chosen-token logprob, one entry per `token_ids` (rank 0). Populated only
  // when the request set `return_logprobs`.
  repeated LogProb logprobs = 3;
  // Per-token top-K alternatives: `top_logprobs[i]` holds the ranked candidates
  // for `token_ids[i]`. Populated only when the request set `top_logprobs > 0`.
  repeated TopLogprobs top_logprobs = 4;
}

message LogProb {
  uint32 token_id = 1;
  double logprob = 2;
  string token = 3;
  uint32 rank = 4;
}

// Ranked top-K logprob candidates for a single output position.
message TopLogprobs {
  repeated LogProb entries = 1;
}

message PrefillReady {
  KvSessionRef kv_session = 1;
}

message GenerationFinished {
  FinishReason reason = 1;
  string message = 2;
}

enum FinishReason {
  FINISH_REASON_UNSPECIFIED = 0;
  FINISH_REASON_STOP = 1;
  FINISH_REASON_LENGTH = 2;
  FINISH_REASON_CANCELLED = 3;
  FINISH_REASON_ERROR = 4;
}

message Usage {
  uint32 prompt_tokens = 1;
  uint32 completion_tokens = 2;
  uint32 total_tokens = 3;
}

// ---------------------------------------------------------------------------
// Disaggregated serving and KV API
// ---------------------------------------------------------------------------

message KvSessionRef {
  string session_id = 1;
  string transfer_backend = 2;
  repeated KvEndpoint endpoints = 3;
  uint32 dp_rank = 4;
  // Engine-specific KV-transfer parameters (e.g. NixlConnector
  // remote_host / remote_port / tp_size / remote_block_ids / do_remote_*),
  // carried as a Struct so numbers, booleans, and arrays survive the wire with
  // their JSON type intact. Struct numbers are IEEE-754 doubles (exact only to
  // 2^53); carry larger integer values as strings or use a dedicated field.
  google.protobuf.Struct attributes_struct = 5;
}

message KvEndpoint {
  string host = 1;
  uint32 port = 2;
  string protocol = 3; // grpc, nixl, ucx, tcp, shm, etc.
}

// ---------------------------------------------------------------------------
// KV connector and KV events
// ---------------------------------------------------------------------------

message GetKvConnectorInfoRequest {}

message KvConnectorInfo {
  bool enabled = 1;
  string transfer_backend = 2;
  repeated KvEndpoint local_endpoints = 3;
  repeated string supported_protocols = 4;
  bool supports_remote_prefill = 5;
  bool supports_decode_pull = 6;
  bool supports_abort_cleanup = 7;
  bool supports_drain = 8;
  uint32 schema_version = 9;
}

message GetKvEventSourcesRequest {
  repeated uint32 data_parallel_ranks = 1;
}

message GetKvEventSourcesResponse {
  repeated KvEventSource sources = 1;
}

message KvEventSource {
  string transport = 1;          // grpc, zmq
  // Connectable address. MUST use a routable host, never a bind wildcard.
  KvEndpoint endpoint_addr = 2;
  string topic = 3;
  string replay_endpoint = 4;    // optional, for ZMQ replay
  uint32 data_parallel_rank = 5;
  string encoding = 6;           // protobuf, msgpack
  uint32 schema_version = 7;
  uint32 buffer_steps = 8;
  uint32 hwm = 9;
  uint32 max_queue_size = 10;
}

message SubscribeKvEventsRequest {
  repeated uint32 data_parallel_ranks = 1;
  bool include_snapshot = 2;
  uint64 start_sequence_number = 3;
}

message KvEventBatch {
  uint64 sequence_number = 1;
  uint64 timestamp_unix_nanos = 2;
  uint32 data_parallel_rank = 3;
  repeated KvEvent events = 4;
}

message KvEvent {
  string request_id = 1;
  KvSessionRef kv_session = 2;

  oneof event {
    BlockStored block_stored = 10;
    BlockRemoved block_removed = 11;
    AllBlocksCleared all_blocks_cleared = 12;
  }
}

message BlockStored {
  repeated KvBlockHash block_hashes = 1;
  KvBlockHash parent_block_hash = 2;
  repeated uint32 token_ids = 3;
  uint32 block_size = 4;
  int64 lora_id = 5;
  string lora_name = 6;
  StorageMedium medium = 7;

  // vLLM-compatible optional metadata for reconstructing block keys.
  repeated OpaqueKeyTuple extra_keys = 20;
  uint32 group_idx = 21;
  string kv_cache_spec_kind = 22;
  uint32 kv_cache_spec_sliding_window = 23;
}

message BlockRemoved {
  repeated KvBlockHash block_hashes = 1;
  StorageMedium medium = 2;
  uint32 group_idx = 3;
}

message AllBlocksCleared {}

message KvBlockHash {
  bytes value = 1;
  string encoding = 2; // int64, string, bytes, engine_specific
}

message OpaqueKeyTuple {
  repeated string values = 1;
}

enum StorageMedium {
  STORAGE_MEDIUM_UNSPECIFIED = 0;
  STORAGE_MEDIUM_GPU = 1;
  STORAGE_MEDIUM_CPU_PINNED = 2;
  STORAGE_MEDIUM_DISK = 3;
  STORAGE_MEDIUM_EXTERNAL = 4;
}

// ---------------------------------------------------------------------------
// Health, abort, and drain
// ---------------------------------------------------------------------------

message HealthRequest {
  // False means a lightweight readiness/liveness check. True asks the engine to
  // run a role-appropriate minimal inference probe and report it as a check.
  bool include_inference_probe = 1;

  // Optional. Used when include_inference_probe is true. Empty means engine
  // default served model.
  string model = 2;

  // Optional expected role for role-specific inference probes.
  EngineRole role = 3;
}

message HealthResponse {
  HealthState state = 1;
  repeated HealthCheck checks = 2;
}

enum HealthState {
  HEALTH_STATE_UNSPECIFIED = 0;
  HEALTH_STATE_STARTING = 1;
  HEALTH_STATE_READY = 2;
  HEALTH_STATE_DEGRADED = 3;
  HEALTH_STATE_DRAINING = 4;
  HEALTH_STATE_NOT_READY = 5;
}

message HealthCheck {
  string name = 1; // grpc, scheduler, model, kv_connector, role, inference_probe
  HealthState state = 2;
  string message = 3;
}

message AbortRequest {
  string request_id = 1;
  KvSessionRef kv_session = 2;
  bool abort_all = 3;
}

message AbortResponse {
  AbortStatus status = 1;
  string message = 2;
}

enum AbortStatus {
  ABORT_STATUS_UNSPECIFIED = 0;
  ABORT_STATUS_ABORTED = 1;
  ABORT_STATUS_NOT_FOUND = 2;
  ABORT_STATUS_ALREADY_FINISHED = 3;
  ABORT_STATUS_UNSUPPORTED = 4;
}

message DrainRequest {
  bool stop_accepting_new_requests = 1;
  uint32 deadline_ms = 2;
  bool abort_after_deadline = 3;
}

message DrainResponse {
  DrainState state = 1;
  uint32 in_flight_requests = 2;
  uint32 open_kv_sessions = 3;
  string message = 4;
}

enum DrainState {
  DRAIN_STATE_UNSPECIFIED = 0;
  DRAIN_STATE_STARTED = 1;
  DRAIN_STATE_IN_PROGRESS = 2;
  DRAIN_STATE_COMPLETE = 3;
  DRAIN_STATE_FAILED = 4;
}

// ---------------------------------------------------------------------------
// Runtime observability
// ---------------------------------------------------------------------------

message GetLoadRequest {
  bool include_per_rank = 1;
}

message LoadInfo {
  string instance_id = 1;
  uint64 timestamp_unix_nanos = 2;
  uint32 running_requests = 3;
  uint32 queued_requests = 4;
  uint32 active_kv_sessions = 5;
  uint64 used_kv_blocks = 6;
  uint64 total_kv_blocks = 7;
  uint64 running_tokens = 8;
  uint64 waiting_tokens = 9;
  uint32 prefill_batch_size = 10;
  uint32 decode_batch_size = 11;
  repeated RankLoadInfo ranks = 20;
  map<string, string> attributes = 30;
}

message RankLoadInfo {
  uint32 data_parallel_rank = 1;
  uint32 running_requests = 2;
  uint32 queued_requests = 3;
  uint64 used_kv_blocks = 4;
  uint64 total_kv_blocks = 5;
  uint32 prefill_batch_size = 6;
  uint32 decode_batch_size = 7;
}

message SubscribeRuntimeEventsRequest {
  repeated RuntimeEventType types = 1;
}

enum RuntimeEventType {
  RUNTIME_EVENT_TYPE_UNSPECIFIED = 0;
  RUNTIME_EVENT_TYPE_FORWARD_PASS = 1;
  RUNTIME_EVENT_TYPE_BATCH = 2;
  RUNTIME_EVENT_TYPE_QUEUE = 3;
  RUNTIME_EVENT_TYPE_TRANSFER = 4;
}

message RuntimeEvent {
  string event_id = 1;
  uint64 timestamp_unix_nanos = 2;
  RuntimeEventType type = 3;
  map<string, string> attributes = 4;
}

// ---------------------------------------------------------------------------
// Standard errors
// ---------------------------------------------------------------------------

message EngineError {
  ErrorCode code = 1;
  string message = 2;
  string retry_hint = 3;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INVALID_ARGUMENT = 1;
  ERROR_CODE_UNSUPPORTED_FEATURE = 2;
  ERROR_CODE_ROLE_MISMATCH = 3;
  ERROR_CODE_MODEL_NOT_FOUND = 4;
  ERROR_CODE_OVERLOADED = 5;
  ERROR_CODE_REQUEST_NOT_FOUND = 6;
  ERROR_CODE_DUPLICATE_REQUEST = 7;
  ERROR_CODE_KV_SESSION_NOT_FOUND = 8;
  ERROR_CODE_KV_TRANSFER_FAILED = 9;
  ERROR_CODE_CANCELLED = 10;
  ERROR_CODE_DRAINING = 11;
  ERROR_CODE_INTERNAL = 12;
}
